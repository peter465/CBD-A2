name: CI/CD Pipeline with Code Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for SonarQube
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
      
    # Generate coverage report
    - name: Generate Coverage Report
      run: mvn jacoco:report
    
    # SonarQube Code Analysis with Quality Gate
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    # Package and Deploy
    - name: Package JAR
      run: mvn package -DskipTests
    
    - name: Build Docker Image
      run: docker build -t rest-api:latest .
    
    - name: Run Container
      run: |
        docker run -d --name rest-api -p 8080:8080 rest-api:latest
        sleep 10
    
    - name: Verify Deployment
      run: curl -f http://localhost:8080/ || true
    
    - name: Quality Gate Status
      if: failure()
      run: echo "Quality gate failed - check SonarCloud for details"