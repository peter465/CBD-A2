name: CI/CD Pipeline for REST API

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Build with Maven
      run: mvn clean compile
    
    - name: Run Tests
      run: mvn test
    
    - name: Package JAR
      run: mvn package -DskipTests
    
    - name: Build Docker Image
      run: docker build -t rest-api:latest .
    
    - name: Run Container
      run: docker run -d --name rest-api -p 8080:8080 rest-api:latest
    
    - name: Wait for app to start
      run: sleep 10
    
    - name: Test API
      run: curl -f http://localhost:8080/
    
    - name: Show logs on failure
      if: failure()
      run: docker logs rest-api