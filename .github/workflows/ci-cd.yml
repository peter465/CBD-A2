name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Build with Maven (skip tests)
      run: mvn clean compile -DskipTests
    
    - name: Package JAR
      run: mvn package -DskipTests
    
    - name: Build Docker Image
      run: docker build -t rest-api:latest .
    
    - name: Run Container
      run: |
        docker run -d --name rest-api -p 8080:8080 rest-api:latest
        sleep 10
    
    - name: Verify API
      run: curl -f http://localhost:8080/ || true
    
    - name: Show Docker logs
      run: docker logs rest-api