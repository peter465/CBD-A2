name: CI/CD Pipeline with SonarQube

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Run tests
      run: mvn test
    
    - name: Generate coverage report
      run: mvn jacoco:report
    
    - name: SonarQube Scan
      run: mvn sonar:sonar -Dsonar.qualitygate.wait=true
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
    - name: Package JAR
      run: mvn package -DskipTests
    
    - name: Build Docker Image
      run: docker build -t rest-api:latest .
    
    - name: Run Container
      run: |
        docker run -d --name rest-api -p 8080:8080 rest-api:latest
        sleep 10
    
    - name: Verify API
      run: curl -f http://localhost:8080/ || echo "API test completed"
    
    - name: Show Docker logs on failure
      if: failure()
      run: docker logs rest-api